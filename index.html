<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع جذاب</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6e8efb, #a777e3);
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: rgba(0,0,0,0.2);
}

nav a {
  margin: 10px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}

nav a:hover {
  color: yellow;
}

section {
  padding: 50px;
}

/* زر تحميل */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 15px 25px;
  background: white;
  color: #6e8efb;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

/* إخفاء العناصر */
.hidden {
  display: none;
}

.card {
  background: rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>مرحبا بك في موقعي</h1>

  <nav>
    <a onclick="showHome()">الرئيسية</a>
    <a onclick="toggleServices()">الخدمات</a>
    <a onclick="toggleAbout()">عن الموقع</a>
    <a onclick="toggleContact()">تواصل معنا</a>
  </nav>
</header>

<!-- الرئيسية -->
<section id="home">
  <h2>موقع جذاب وحديث</h2>

  <!-- زر جديد -->
  <a class="btn" href="https://drive.google.com/file/d/1XRhhlYYnTIrHJ8vY6r_ixO_4CBTKs46y/view?usp=drivesdk" target="_blank">
    تحميل لعبة جنرال زيرو اور مجانا
  </a>
</section>

<!-- الخدمات (مخفية) -->
<section id="services" class="hidden">
  <h2>الخدمات</h2>

  <a class="btn" href="files/file1.pdf" download>تحميل الملف الأول</a>
  <a class="btn" href="files/file2.zip" download>تحميل الملف الثاني</a>
</section>

<!-- عن الموقع (مخفية) -->
<section id="about" class="hidden">
  <h2>عن الموقع</h2>

  <div class="card">
    هو موقع صممه احمد حلاق
  </div>
</section>

<!-- تواصل معنا (مخفية) -->
<section id="contact" class="hidden">
  <h2>تواصل معنا</h2>

  <div class="card">
    📸 إنستغرام: ahmad657412
  </div>
</section>

<script>
function hideAll(){
  document.getElementById("services").classList.add("hidden");
  document.getElementById("about").classList.add("hidden");
  document.getElementById("contact").classList.add("hidden");
}

function showHome(){
  hideAll();
}

function toggleServices(){
  hideAll();
  document.getElementById("services").classList.remove("hidden");
}

function toggleAbout(){
  hideAll();
  document.getElementById("about").classList.remove("hidden");
}

function toggleContact(){
  hideAll();
  document.getElementById("contact").classList.remove("hidden");
}
</script>

</body>
</html>
